user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    client_max_body_size 50m;

    # ── Rate Limiting Zones (dev: generous limits for local development) ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=100r/m;

    map $http_origin $cors_origin {
        default "";
        "~^https?://(.*\.)?aibrand\..*$" $http_origin;
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "~^https?://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
        "~^https?://0\.0\.0\.0(:[0-9]+)?$" $http_origin;
    }

    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;

    # Hide backend CORS headers, managed by nginx
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Max-Age;

    proxy_connect_timeout 120s;
    proxy_send_timeout 60s;
    proxy_read_timeout 86400s;

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, HEAD, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept, Accept-Encoding, Accept-Language, Authorization, Cache-Control, Content-Type, Cookie, DNT, Origin, Pragma, Referer, User-Agent, X-Requested-With, X-Request-ID, X-CSRF-Token, X-Auth-Token, X-HTTP-Method-Override, Next-Router-Prefetch, Next-Router-State-Tree, Next-Url, RSC, Sec-CH-UA, Sec-CH-UA-Mobile, Sec-CH-UA-Platform, Sec-Fetch-Dest, Sec-Fetch-Mode, Sec-Fetch-Site, Priority, If-None-Match, If-Modified-Since" always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Max-Age 86400 always;

    # HTTPS server (aibrand.local)
    server {
        listen 443 ssl;
        http2 on;
        server_name aibrand.local *.aibrand.local;

        ssl_certificate /etc/nginx/certs/aibrand.local.crt;
        ssl_certificate_key /etc/nginx/certs/aibrand.local.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # ── Security Headers ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:* https:; frame-src 'none'; object-src 'none'; base-uri 'self'" always;

        # ── Rate Limiting (server-level API zone only) ──
        limit_req zone=api burst=50 nodelay;

        location = /_nhealth {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Login-specific rate limiting (only applies to login paths)
        location /api/login/ {
            limit_req zone=login burst=10 nodelay;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://aibrand-server:3002;
        }

        location /api/ai/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://aibrand-ai:3010;
        }

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://aibrand-server:3002;
        }

        location /oss/ {
            proxy_pass http://aibrand-rustfs:9000/aibrand/;
        }

        location / {
            proxy_pass http://host.docker.internal:6060;
        }
    }

    # HTTP server (redirect to HTTPS for aibrand.local, serve others)
    server {
        listen 80;
        server_name _;

        # ── Security Headers (except HSTS - only on HTTPS) ──
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Rate Limiting (server-level API zone only) ──
        limit_req zone=api burst=50 nodelay;

        location = /_nhealth {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Login-specific rate limiting (only applies to login paths)
        location /api/login/ {
            limit_req zone=login burst=10 nodelay;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://aibrand-server:3002;
        }

        location /api/ai/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://aibrand-ai:3010;
        }

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://aibrand-server:3002;
        }

        location /oss/ {
            proxy_pass http://aibrand-rustfs:9000/aibrand/;
        }

        location / {
            proxy_pass http://host.docker.internal:6060;
        }
    }

    # S3 代理：浏览器通过此端口上传文件到 rustfs
    server {
        listen 9000;
        listen [::]:9000;
        server_name _;

        client_max_body_size 500m;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, PUT, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers * always;
        add_header Access-Control-Expose-Headers "ETag" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        location / {
            proxy_pass http://aibrand-rustfs:9000;
            proxy_set_header Host $http_host;
            proxy_http_version 1.1;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
    }
}
