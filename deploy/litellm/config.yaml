# LiteLLM Proxy Configuration — AiBrand 模型网关 (Stage 5)
# 部署: docker run -p 4000:4000 -v ./config.yaml:/app/config.yaml ghcr.io/berriai/litellm:main-latest

general_settings:
  master_key: aibrand-litellm-key-2026

model_list:
  # ═══════════════ DeepSeek 系列 ═══════════════
  - model_name: deepseek-v3
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: sk-ed55ee5109dd44e6940c3a4b63c527d7
      rpm: 500
      tpm: 500000
    model_info:
      mode: chat
      max_tokens: 8192

  - model_name: deepseek-r1
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: sk-ed55ee5109dd44e6940c3a4b63c527d7
      rpm: 100
      tpm: 200000
    model_info:
      mode: chat
      max_tokens: 8192

  # ═══════════════ 智谱 GLM 系列 ═══════════════
  - model_name: glm-4-flash
    litellm_params:
      model: openai/glm-4-flash
      api_base: https://open.bigmodel.cn/api/paas/v4
      api_key: 698b586e81344b4a9d96dc113d899d5a.INTvGuIV6GY5khF3
      rpm: 200
      tpm: 300000
    model_info:
      mode: chat
      max_tokens: 4096

  - model_name: glm-4
    litellm_params:
      model: openai/glm-4
      api_base: https://open.bigmodel.cn/api/paas/v4
      api_key: 698b586e81344b4a9d96dc113d899d5a.INTvGuIV6GY5khF3
      rpm: 100
      tpm: 200000
    model_info:
      mode: chat
      max_tokens: 8192

  # ═══════════════ 阿里百炼 Qwen 系列 ═══════════════
  - model_name: qwen-turbo
    litellm_params:
      model: openai/qwen-turbo
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: sk-b753e53c5f9549a9b6e2abf377a4fe24
      rpm: 300
      tpm: 500000
    model_info:
      mode: chat
      max_tokens: 4096

  - model_name: qwen-plus
    litellm_params:
      model: openai/qwen-plus
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: sk-b753e53c5f9549a9b6e2abf377a4fe24
      rpm: 150
      tpm: 300000
    model_info:
      mode: chat
      max_tokens: 8192

  - model_name: qwen-max
    litellm_params:
      model: openai/qwen-max
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: sk-b753e53c5f9549a9b6e2abf377a4fe24
      rpm: 60
      tpm: 100000
    model_info:
      mode: chat
      max_tokens: 8192

  # ═══════════════ Anthropic Claude 系列 (需 ANTHROPIC_API_KEY) ═══════════════
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY}
      rpm: 50
      tpm: 100000
    model_info:
      mode: chat
      max_tokens: 4096

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: ${ANTHROPIC_API_KEY}
      rpm: 200
      tpm: 300000
    model_info:
      mode: chat
      max_tokens: 4096

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: ${ANTHROPIC_API_KEY}
      rpm: 20
      tpm: 50000
    model_info:
      mode: chat
      max_tokens: 4096

  # ═══════════════ Local Fallback (Ollama) ═══════════════
  - model_name: local-fallback
    litellm_params:
      model: openai/qwen2.5:3b
      api_base: http://host.docker.internal:11434/v1
      api_key: ollama
      rpm: 50

# ── Router Settings ──
router_settings:
  routing_strategy: "usage-based-routing"
  enable_tag_filtering: true
  fallbacks:
    - claude-sonnet: [claude-haiku, glm-4, qwen-plus]
    - claude-opus: [claude-sonnet, claude-haiku, qwen-max]
    - deepseek-r1: [deepseek-v3, glm-4, qwen-plus]
    - glm-4: [glm-4-flash, qwen-turbo, deepseek-v3]
    - qwen-plus: [qwen-turbo, glm-4-flash]
  allowed_fails: 3
  num_retries: 2
  retry_after: 1
  cooldown_time: 30

# ── LiteLLM Settings ──
litellm_settings:
  request_timeout: 60
  set_verbose: false
  json_logs: true
  metadata_requester: true
