# ============================================================
# AiBrand Local Deployment — 面向个人与中小企业的精简版
# ============================================================
# 包含: MongoDB + Redis + RustFS + Server + AI + Web + Nginx
# 不包含: Dify / n8n / One-API（AI 功能走内置 LLM 直连）
#
# 最低配置: 2核4G + 20G磁盘
# 启动: docker compose -f docker-compose.local.yml up -d
# ============================================================

services:
  # ── 数据库 ──
  mongodb:
    image: mongo:7
    container_name: aibrand-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-aibrand2024}
    ports:
      - "27017:27017"
    volumes:
      - aibrand-mongo:/data/db
    networks:
      - aibrand-net
    healthcheck:
      test: mongosh --quiet --eval "db.runCommand('ping').ok" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 缓存/队列 ──
  redis:
    image: redis:7-alpine
    container_name: aibrand-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-aibrand2024}
    ports:
      - "6379:6379"
    volumes:
      - aibrand-redis:/data
    networks:
      - aibrand-net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ── 文件存储 ──
  rustfs:
    image: rustfs/rustfs:latest
    container_name: aibrand-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-aibrand}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-aibrand2024}
    ports:
      - "9001:9001"
    volumes:
      - aibrand-files:/data
    networks:
      aibrand-net:
        aliases:
          - rustfs.local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RustFS bucket 初始化
  rustfs-init:
    image: minio/mc:latest
    container_name: aibrand-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    networks:
      - aibrand-net
    entrypoint: >
      /bin/sh -c "
      mc alias set rustfs http://rustfs.local:9000 ${RUSTFS_ACCESS_KEY:-aibrand} ${RUSTFS_SECRET_KEY:-aibrand2024};
      mc mb rustfs/aibrand --ignore-existing;
      mc anonymous set download rustfs/aibrand;
      exit 0;
      "

  # ── AI 服务 ──
  aibrand-ai:
    image: ${DOCKER_REGISTRY:-}aibrand/ai:latest
    pull_policy: ${PULL_POLICY:-never}
    container_name: aibrand-ai
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aibrand-net
    environment:
      NODE_ENV: production
      APP_NAME: aibrand-ai
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: ${MONGO_USER:-admin}
      MONGODB_PASSWORD: ${MONGO_PASS:-aibrand2024}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASS:-aibrand2024}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me-too}
      SERVER_URL: http://aibrand-server:3002
      ASSETS_CONFIG: '{"provider":"s3","region":"us-east-1","bucketName":"aibrand","endpoint":"http://rustfs.local:9000","publicEndpoint":"http://127.0.0.1:9000","cdnEndpoint":"http://127.0.0.1:9000","accessKeyId":"${RUSTFS_ACCESS_KEY:-aibrand}","secretAccessKey":"${RUSTFS_SECRET_KEY:-aibrand2024}","forcePathStyle":true}'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── 后端 API ──
  aibrand-server:
    image: ${DOCKER_REGISTRY:-}aibrand/server:latest
    pull_policy: ${PULL_POLICY:-never}
    container_name: aibrand-server
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      aibrand-ai:
        condition: service_healthy
    networks:
      - aibrand-net
    environment:
      NODE_ENV: production
      APP_NAME: aibrand-server
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_USERNAME: ${MONGO_USER:-admin}
      MONGODB_PASSWORD: ${MONGO_PASS:-aibrand2024}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASS:-aibrand2024}
      AI_URL: http://aibrand-ai:3010
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me-too}
      ASSETS_CONFIG: '{"provider":"s3","region":"us-east-1","bucketName":"aibrand","endpoint":"http://rustfs.local:9000","publicEndpoint":"http://127.0.0.1:9000","cdnEndpoint":"http://127.0.0.1:9000","accessKeyId":"${RUSTFS_ACCESS_KEY:-aibrand}","secretAccessKey":"${RUSTFS_SECRET_KEY:-aibrand2024}","forcePathStyle":true}'
      NEW_API_BASE_URL: http://one-api:4012
      NEW_API_TOKEN: ${NEW_API_TOKEN:-}
      DIFY_API_BASE: ${DIFY_API_BASE:-}
      DIFY_APP_API_KEY: ${DIFY_APP_API_KEY:-}
      DIFY_ACCESS_TOKEN: ${DIFY_ACCESS_TOKEN:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── 前端 ──
  aibrand-web:
    image: ${DOCKER_REGISTRY:-}aibrand/web:latest
    pull_policy: ${PULL_POLICY:-never}
    container_name: aibrand-web
    restart: unless-stopped
    depends_on:
      aibrand-server:
        condition: service_healthy
    networks:
      - aibrand-net
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      PORT: 3000
      HOSTNAME: "0.0.0.0"

  # ── 反向代理 ──
  nginx:
    image: nginx:alpine
    container_name: aibrand-nginx
    restart: unless-stopped
    depends_on:
      aibrand-web:
        condition: service_started
      aibrand-server:
        condition: service_healthy
      aibrand-ai:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
    networks:
      - aibrand-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/_nhealth"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  aibrand-net:
    driver: bridge
    name: aibrand-net

volumes:
  aibrand-mongo:
  aibrand-redis:
  aibrand-files:
